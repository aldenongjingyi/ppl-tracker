<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>PPL Tracker</title>
<style>
  :root {
    --bg: #FAFAF8; --card: #FFFFFF; --border: #E7E2D9;
    --ink: #1c1a17; --muted: #8a8278;
    --push: #B5483B; --pull: #3B6FA0; --legs: #3F8F5C;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    min-height: 100vh;
    overscroll-behavior: none;
  }

  /* ─── Login ─────────────────────────────────────── */
  #login-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 20px;
  }

  .login-card {
    width: 100%;
    max-width: 340px;
  }

  .login-logo {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.02em;
    color: var(--ink);
    margin-bottom: 4px;
  }

  .login-sub {
    font-size: 14px;
    color: var(--muted);
    margin-bottom: 24px;
  }

  /* Existing user quick-pick pills */
  #user-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 16px;
  }

  .user-pill-btn {
    border-radius: 999px;
    padding: 6px 14px;
    font-size: 13px;
    font-weight: 500;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--ink);
    font-family: inherit;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
  }

  .user-pill-btn:hover { background: #F2F0EB; border-color: #ccc7be; }
  .user-pill-btn.selected { background: var(--ink); color: #fff; border-color: var(--ink); }

  .login-form {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .login-input {
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 13px 14px;
    font-size: 15px;
    font-family: inherit;
    color: var(--ink);
    background: var(--card);
    outline: none;
    transition: border-color 0.15s;
    width: 100%;
  }

  .login-input:focus { border-color: #b8b0a5; }
  .login-input::placeholder { color: #c9c2b6; }

  .login-btn {
    border-radius: 12px;
    padding: 13px;
    font-size: 15px;
    font-weight: 600;
    font-family: inherit;
    background: var(--ink);
    color: #fff;
    border: none;
    cursor: pointer;
    transition: opacity 0.15s;
    margin-top: 2px;
  }

  .login-btn:active { opacity: 0.8; }

  .login-error {
    font-size: 13px;
    color: var(--push);
    margin-top: 10px;
    min-height: 18px;
    text-align: center;
  }

  /* ─── App shell ──────────────────────────────────── */
  #app { display: none; }

  #header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(250, 250, 248, 0.95);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px;
  }

  .header-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .app-title {
    font-size: 17px;
    font-weight: 700;
    letter-spacing: -0.01em;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  #status {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
    opacity: 0;
    transition: opacity 0.2s;
  }

  #status.visible { opacity: 1; }

  .user-badge {
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    text-transform: capitalize;
  }

  .logout-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    width: 30px;
    height: 30px;
    font-size: 15px;
    color: var(--muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
  }

  .logout-btn:hover { background: #F2F0EB; }

  /* ─── Calendar ───────────────────────────────────── */
  #calendar-view {
    padding: 16px;
    max-width: 500px;
    margin: 0 auto;
  }

  .month-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .month-label {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }

  .nav-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--muted);
    font-size: 18px;
    line-height: 1;
    transition: background 0.15s;
  }

  .nav-btn:hover { background: #F2F0EB; }

  .week-headers {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
    margin-bottom: 4px;
  }

  .week-header {
    text-align: center;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--muted);
    padding: 4px 0;
  }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
  }

  .cal-day {
    border-radius: 10px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
    border: 1px solid transparent;
    padding: 6px 2px;
    min-height: 50px;
    gap: 3px;
  }

  .cal-day.empty { cursor: default; pointer-events: none; }
  .cal-day:not(.empty):hover { background: #F2F0EB; }

  .cal-day.today {
    border-color: var(--border);
    background: var(--card);
  }

  .cal-day.has-workout {
    background: var(--card);
    border-color: var(--border);
  }

  .day-num {
    font-size: 13px;
    font-weight: 500;
    color: var(--ink);
    line-height: 1;
  }

  .cal-day.today .day-num { font-weight: 700; }

  .workout-badge {
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.02em;
    color: #fff;
    border-radius: 4px;
    padding: 1px 4px;
    line-height: 1.4;
    white-space: nowrap;
  }

  /* ─── Day view ───────────────────────────────────── */
  #day-view {
    display: none;
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 200;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  #day-view.open { display: block; }

  .day-header {
    position: sticky;
    top: 0;
    background: rgba(250, 250, 248, 0.95);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .back-btn {
    background: none;
    border: none;
    font-size: 24px;
    color: var(--muted);
    cursor: pointer;
    padding: 0;
    line-height: 1;
    flex-shrink: 0;
  }

  .back-btn:hover { color: var(--ink); }

  .day-date-label {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: -0.01em;
    flex: 1;
  }

  #day-status {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
    opacity: 0;
    transition: opacity 0.2s;
  }

  #day-status.visible { opacity: 1; }

  .day-content {
    padding: 16px;
    max-width: 700px;
    margin: 0 auto;
  }

  /* Type selector */
  .type-selector {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    margin-bottom: 14px;
  }

  .type-selector::-webkit-scrollbar { display: none; }

  .type-pill {
    flex-shrink: 0;
    border-radius: 999px;
    padding: 6px 13px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: inherit;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
    white-space: nowrap;
  }

  .type-pill.active-push { background: var(--push); color: #fff; border-color: transparent; }
  .type-pill.active-pull { background: var(--pull); color: #fff; border-color: transparent; }
  .type-pill.active-legs { background: var(--legs); color: #fff; border-color: transparent; }

  /* Copy bar */
  #copy-bar {
    margin-bottom: 14px;
  }

  .copy-btn {
    background: #F2F0EB;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 13px;
    color: var(--ink);
    font-family: inherit;
    cursor: pointer;
    transition: background 0.15s;
  }

  .copy-btn:hover { background: #E8E4DC; }

  /* Column headers */
  .col-headers {
    display: grid;
    grid-template-columns: 1fr 58px 48px 48px 26px;
    gap: 8px;
    padding: 0 4px;
    margin-bottom: 4px;
  }

  .col-header {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--muted);
    padding: 0 4px;
  }

  .col-header.center { text-align: center; }

  /* Exercise rows */
  .exercise-row {
    display: grid;
    grid-template-columns: 1fr 58px 48px 48px 26px;
    gap: 8px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 7px 8px;
    margin-bottom: 6px;
    align-items: center;
  }

  .exercise-row input {
    border: none;
    outline: none;
    font-family: inherit;
    font-size: 14px;
    color: var(--ink);
    background: transparent;
    width: 100%;
    padding: 0;
  }

  .exercise-row input.name-input { font-weight: 500; }

  .exercise-row input.num-input {
    background: #F5F4F1;
    border-radius: 8px;
    text-align: center;
    padding: 7px 2px;
  }

  .exercise-row input::placeholder { color: #c9c2b6; }

  .delete-btn {
    background: none;
    border: none;
    color: #c9c2b6;
    font-size: 14px;
    cursor: pointer;
    font-family: inherit;
    padding: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 26px;
    height: 26px;
    border-radius: 6px;
    transition: color 0.15s;
    flex-shrink: 0;
  }

  .delete-btn:hover { color: #c0392b; }

  .add-btn {
    display: block;
    width: 100%;
    border-radius: 12px;
    border: 1.5px dashed var(--border);
    background: none;
    color: var(--muted);
    font-family: inherit;
    font-size: 14px;
    padding: 10px;
    margin-top: 6px;
    cursor: pointer;
    transition: background 0.15s;
  }

  .add-btn:hover { background: #F2F0EB; }

  .no-type-msg {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
    font-size: 14px;
  }
</style>
</head>
<body>

<!-- ═══ Login screen ════════════════════════════════ -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">PPL Tracker</div>
    <div class="login-sub">Who's training today?</div>
    <div id="user-pills"></div>
    <div class="login-form">
      <input id="login-username" class="login-input" type="text" placeholder="Username" autocomplete="off" autocapitalize="off" spellcheck="false">
      <input id="login-password" class="login-input" type="password" placeholder="Password (optional)">
      <button class="login-btn" id="login-btn">Let's go →</button>
    </div>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- ═══ App ═════════════════════════════════════════ -->
<div id="app">
  <div id="header">
    <div class="header-row">
      <span class="app-title">PPL Tracker</span>
      <div class="header-right">
        <span id="status"></span>
        <span id="user-badge" class="user-badge"></span>
        <button class="logout-btn" id="logout-btn" title="Switch user">↩</button>
      </div>
    </div>
  </div>

  <div id="calendar-view">
    <div class="month-nav">
      <button class="nav-btn" id="prev-month">‹</button>
      <span class="month-label" id="month-label"></span>
      <button class="nav-btn" id="next-month">›</button>
    </div>
    <div class="week-headers">
      <div class="week-header">Mo</div><div class="week-header">Tu</div>
      <div class="week-header">We</div><div class="week-header">Th</div>
      <div class="week-header">Fr</div><div class="week-header">Sa</div>
      <div class="week-header">Su</div>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
  </div>

  <!-- Day detail (full screen) -->
  <div id="day-view">
    <div class="day-header">
      <button class="back-btn" id="back-btn">‹</button>
      <div class="day-date-label" id="day-date-label"></div>
      <span id="day-status"></span>
    </div>
    <div class="day-content">
      <div class="type-selector" id="type-selector"></div>
      <div id="copy-bar" style="display:none">
        <button class="copy-btn" id="copy-btn"></button>
      </div>
      <div id="exercises-section" style="display:none">
        <div class="col-headers">
          <span class="col-header">Exercise</span>
          <span class="col-header center">kg</span>
          <span class="col-header center">Reps</span>
          <span class="col-header center">Sets</span>
          <span class="col-header"></span>
        </div>
        <div id="rows-container"></div>
        <button class="add-btn" id="add-row-btn">+ Add exercise</button>
      </div>
      <div id="no-type-msg" class="no-type-msg" style="display:none">
        Select a workout type above to start logging.
      </div>
    </div>
  </div>
</div>

<script>
const GH_USER  = "aldenongjingyi";
const GH_REPO  = "ppl-tracker";
const GH_TOKEN = ["gho", "_376xGcWqmmxRXuvdT7TlitybOxlwsL16m3uv"].join("");
const FILE_PATH = "ppl-data.json";
const API       = `https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/${FILE_PATH}`;
const HEADERS   = {
  "Authorization": `token ${GH_TOKEN}`,
  "Content-Type": "application/json",
  "Accept": "application/vnd.github+json",
};

const TYPES = [
  { key: "pushA", label: "Push A", colorType: "push", color: "#B5483B" },
  { key: "pullA", label: "Pull A", colorType: "pull", color: "#3B6FA0" },
  { key: "legsA", label: "Legs A", colorType: "legs", color: "#3F8F5C" },
  { key: "pushB", label: "Push B", colorType: "push", color: "#B5483B" },
  { key: "pullB", label: "Pull B", colorType: "pull", color: "#3B6FA0" },
  { key: "legsB", label: "Legs B", colorType: "legs", color: "#3F8F5C" },
];
const TYPE_MAP = Object.fromEntries(TYPES.map(t => [t.key, t]));

// ── State ──────────────────────────────────────────
let fileSha      = null;
// Full data: { users: { "alice": { password: "", days: { "YYYY-MM-DD": { type, exercises: [] } } } } }
let fullData     = { users: {} };
let currentUser  = null; // username string
let calYear, calMonth;
let selectedDate = null; // "YYYY-MM-DD"
let saveTimer    = null;
let statusTimer  = null;

// ── Helpers ────────────────────────────────────────
function makeRow(name="", weight="", reps="", sets="") {
  return { id: crypto.randomUUID(), name, weight, reps, sets };
}

function dateStr(y, m, d) {
  return `${y}-${String(m).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
}

function todayStr() {
  const t = new Date();
  return dateStr(t.getFullYear(), t.getMonth()+1, t.getDate());
}

function formatDateLabel(str) {
  const [y,m,d] = str.split("-").map(Number);
  return new Date(y, m-1, d).toLocaleDateString("en-GB", {
    weekday: "long", day: "numeric", month: "long"
  });
}

function userData() {
  return fullData.users[currentUser] || { password: "", days: {} };
}

function userDays() {
  return userData().days || {};
}

// ── GitHub ─────────────────────────────────────────
async function ghLoad() {
  try {
    const res = await fetch(API, { headers: HEADERS });
    if (res.status === 404) { fullData = { users: {} }; return; }
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();
    fileSha = json.sha;
    const parsed = JSON.parse(atob(json.content.replace(/\n/g, "")));
    // Migrate old format (top-level pushA/pullA etc.)
    fullData = parsed.users ? parsed : { users: {} };
  } catch(e) {
    console.error("Load:", e);
    fullData = { users: {} };
  }
}

async function ghSave() {
  showStatus("saving");
  const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(fullData, null, 2))));
  const body = { message: "Update workout data", content: encoded };
  if (fileSha) body.sha = fileSha;
  try {
    const res = await fetch(API, { method: "PUT", headers: HEADERS, body: JSON.stringify(body) });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    fileSha = (await res.json()).content.sha;
    showStatus("saved");
  } catch(e) {
    console.error("Save:", e);
    showStatus("error");
  }
}

function scheduleSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(ghSave, 700);
}

// ── Status ─────────────────────────────────────────
function showStatus(state) {
  ["status","day-status"].forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    clearTimeout(statusTimer);
    el.textContent = state === "saving" ? "Saving…" : state === "saved" ? "Saved" : "Error";
    el.classList.add("visible");
    if (state !== "saving") {
      statusTimer = setTimeout(() => el.classList.remove("visible"), 1200);
    }
  });
}

// ── Login ──────────────────────────────────────────
function renderUserPills() {
  const container = document.getElementById("user-pills");
  container.innerHTML = "";
  const names = Object.keys(fullData.users);
  if (!names.length) return;
  names.forEach(name => {
    const btn = document.createElement("button");
    btn.className = "user-pill-btn";
    btn.textContent = name;
    btn.addEventListener("click", () => {
      document.getElementById("login-username").value = name;
      document.querySelectorAll(".user-pill-btn").forEach(b => b.classList.remove("selected"));
      btn.classList.add("selected");
      document.getElementById("login-password").focus();
    });
    container.appendChild(btn);
  });
}

function tryLogin() {
  const username = document.getElementById("login-username").value.trim().toLowerCase();
  const password = document.getElementById("login-password").value;
  const errEl    = document.getElementById("login-error");
  errEl.textContent = "";

  if (!username) { errEl.textContent = "Enter a username."; return; }

  const existing = fullData.users[username];
  if (existing) {
    // Existing user: check password if one is set
    if (existing.password && existing.password !== password) {
      errEl.textContent = "Wrong password.";
      return;
    }
  } else {
    // New user: create account
    fullData.users[username] = { password, days: {} };
    ghSave();
  }

  currentUser = username;
  localStorage.setItem("ppl_user", username);
  enterApp();
}

function enterApp() {
  document.getElementById("login-screen").style.display = "none";
  document.getElementById("app").style.display = "block";
  document.getElementById("user-badge").textContent = currentUser;
  const now = new Date();
  calYear  = now.getFullYear();
  calMonth = now.getMonth();
  renderCalendar();
}

function logout() {
  currentUser = null;
  localStorage.removeItem("ppl_user");
  selectedDate = null;
  document.getElementById("day-view").classList.remove("open");
  document.getElementById("app").style.display = "none";
  document.getElementById("login-screen").style.display = "flex";
  document.getElementById("login-username").value = "";
  document.getElementById("login-password").value = "";
  document.getElementById("login-error").textContent = "";
  renderUserPills();
}

// ── Calendar ───────────────────────────────────────
const MONTHS = ["January","February","March","April","May","June",
                "July","August","September","October","November","December"];

function renderCalendar() {
  document.getElementById("month-label").textContent = `${MONTHS[calMonth]} ${calYear}`;
  const grid  = document.getElementById("cal-grid");
  const days  = userDays();
  const today = todayStr();

  // First day offset (Monday = 0)
  let dow = new Date(calYear, calMonth, 1).getDay();
  if (dow === 0) dow = 7;
  const offset = dow - 1;
  const total  = new Date(calYear, calMonth + 1, 0).getDate();

  grid.innerHTML = "";

  for (let i = 0; i < offset; i++) {
    const e = document.createElement("div");
    e.className = "cal-day empty";
    grid.appendChild(e);
  }

  for (let d = 1; d <= total; d++) {
    const ds   = dateStr(calYear, calMonth+1, d);
    const cell = document.createElement("div");
    cell.className = "cal-day";
    if (ds === today) cell.classList.add("today");

    const dayLog = days[ds];
    if (dayLog && dayLog.type) cell.classList.add("has-workout");

    const num = document.createElement("div");
    num.className = "day-num";
    num.textContent = d;
    cell.appendChild(num);

    if (dayLog && dayLog.type && TYPE_MAP[dayLog.type]) {
      const t     = TYPE_MAP[dayLog.type];
      const badge = document.createElement("div");
      badge.className = "workout-badge";
      badge.textContent = t.label;
      badge.style.background = t.color;
      cell.appendChild(badge);
    }

    cell.addEventListener("click", () => openDay(ds));
    grid.appendChild(cell);
  }
}

// ── Day view ───────────────────────────────────────
function openDay(ds) {
  selectedDate = ds;
  document.getElementById("day-date-label").textContent = formatDateLabel(ds);
  document.getElementById("day-view").classList.add("open");
  renderTypeSelector();
  renderExercises();
  updateCopyBar();
}

function closeDay() {
  document.getElementById("day-view").classList.remove("open");
  selectedDate = null;
  renderCalendar();
}

function getOrCreateDay(ds, type) {
  if (!fullData.users[currentUser].days) fullData.users[currentUser].days = {};
  if (!fullData.users[currentUser].days[ds]) {
    fullData.users[currentUser].days[ds] = { type, exercises: [makeRow(),makeRow(),makeRow()] };
  }
  return fullData.users[currentUser].days[ds];
}

function renderTypeSelector() {
  const container = document.getElementById("type-selector");
  container.innerHTML = "";
  const dayLog = userDays()[selectedDate];
  const cur    = dayLog ? dayLog.type : null;

  TYPES.forEach(t => {
    const pill = document.createElement("button");
    pill.className = "type-pill" + (cur === t.key ? ` active-${t.colorType}` : "");
    pill.textContent = t.label;
    pill.addEventListener("click", () => {
      const day = userDays()[selectedDate];
      if (!day) {
        getOrCreateDay(selectedDate, t.key);
      } else {
        day.type = t.key;
        if (!day.exercises || !day.exercises.length) {
          day.exercises = [makeRow(), makeRow(), makeRow()];
        }
      }
      scheduleSave();
      renderTypeSelector();
      renderExercises();
      updateCopyBar();
    });
    container.appendChild(pill);
  });
}

function findPrevSession(beforeDate, type) {
  return Object.keys(userDays())
    .filter(d => d < beforeDate && userDays()[d].type === type)
    .sort().pop() || null;
}

function updateCopyBar() {
  const dayLog = userDays()[selectedDate];
  const bar    = document.getElementById("copy-bar");
  const btn    = document.getElementById("copy-btn");

  if (!dayLog || !dayLog.type) { bar.style.display = "none"; return; }

  const prev = findPrevSession(selectedDate, dayLog.type);
  if (!prev) { bar.style.display = "none"; return; }

  const [y,m,d] = prev.split("-").map(Number);
  const label = new Date(y,m-1,d).toLocaleDateString("en-GB",{day:"numeric",month:"short"});
  btn.textContent = `↓ Copy from ${label}`;
  btn.onclick = () => {
    const src    = userDays()[prev];
    const target = userDays()[selectedDate];
    if (!src || !target) return;
    target.exercises = src.exercises.map(e => ({ ...e, id: crypto.randomUUID() }));
    renderExercises();
    scheduleSave();
  };
  bar.style.display = "block";
}

function renderExercises() {
  const dayLog   = userDays()[selectedDate];
  const section  = document.getElementById("exercises-section");
  const noType   = document.getElementById("no-type-msg");
  const container = document.getElementById("rows-container");

  if (!dayLog || !dayLog.type) {
    section.style.display = "none";
    noType.style.display  = "block";
    return;
  }

  section.style.display = "block";
  noType.style.display  = "none";
  container.innerHTML   = "";
  (dayLog.exercises || []).forEach(row => container.appendChild(buildRow(row)));
}

function buildRow(row) {
  const div = document.createElement("div");
  div.className = "exercise-row";

  function field(type, mode, cls, placeholder, val, key) {
    const inp = document.createElement("input");
    inp.type = type; inp.inputMode = mode; inp.className = cls;
    inp.placeholder = placeholder; inp.value = val || "";
    inp.addEventListener("input", e => { row[key] = e.target.value; scheduleSave(); });
    return inp;
  }

  div.appendChild(field("text", "text",    "name-input", "Exercise name", row.name,   "name"));
  div.appendChild(field("text", "decimal", "num-input",  "—",             row.weight, "weight"));
  div.appendChild(field("text", "numeric", "num-input",  "—",             row.reps,   "reps"));
  div.appendChild(field("text", "numeric", "num-input",  "—",             row.sets,   "sets"));

  const del = document.createElement("button");
  del.className = "delete-btn";
  del.textContent = "✕";
  del.addEventListener("click", () => {
    const dayLog = userDays()[selectedDate];
    if (dayLog) dayLog.exercises = dayLog.exercises.filter(r => r.id !== row.id);
    div.remove();
    scheduleSave();
  });
  div.appendChild(del);
  return div;
}

// ── Wire-up ────────────────────────────────────────
document.getElementById("login-btn").addEventListener("click", tryLogin);
["login-username","login-password"].forEach(id => {
  document.getElementById(id).addEventListener("keydown", e => {
    if (e.key === "Enter") tryLogin();
  });
});

document.getElementById("logout-btn").addEventListener("click", logout);
document.getElementById("back-btn").addEventListener("click", closeDay);

document.getElementById("prev-month").addEventListener("click", () => {
  if (--calMonth < 0) { calMonth = 11; calYear--; }
  renderCalendar();
});
document.getElementById("next-month").addEventListener("click", () => {
  if (++calMonth > 11) { calMonth = 0; calYear++; }
  renderCalendar();
});

document.getElementById("add-row-btn").addEventListener("click", () => {
  const dayLog = userDays()[selectedDate];
  if (!dayLog) return;
  if (!dayLog.exercises) dayLog.exercises = [];
  const row = makeRow();
  dayLog.exercises.push(row);
  document.getElementById("rows-container").appendChild(buildRow(row));
  scheduleSave();
});

// Swipe down to close day view (when scrolled to top)
let touchY0 = 0;
const dayView = document.getElementById("day-view");
dayView.addEventListener("touchstart", e => { touchY0 = e.touches[0].clientY; }, { passive: true });
dayView.addEventListener("touchend",   e => {
  if (dayView.scrollTop === 0 && e.changedTouches[0].clientY - touchY0 > 60) closeDay();
}, { passive: true });

// ── Init ───────────────────────────────────────────
(async () => {
  await ghLoad();
  renderUserPills();

  // Auto-login if user is stored
  const saved = localStorage.getItem("ppl_user");
  if (saved && fullData.users[saved]) {
    currentUser = saved;
    enterApp();
  }
})();
</script>
</body>
</html>
